<div class="dashboard-container">
  <div class="expired-message" *ngIf="showExpiredStandardMessage">
    Package expired. Please ask a admin user to renew
  </div>

  <ng-container *ngIf="!showExpiredStandardMessage">
  <div class="dashboard-header">
    <div class="header-row">
      <div>
        <h1>{{ title }}</h1>
        <p class="subtitle">Welcome to your ShipSmart Dashboard</p>
      </div>
      <button class="edit-button" type="button" (click)="toggleEditMode()">
        {{ editMode ? 'Done' : 'Edit dashboard' }}
      </button>
    </div>
    <div class="dashboard-controls" *ngIf="editMode">
      <label class="control">
        Rows per widget
        <input
          type="number"
          min="1"
          max="20"
          [value]="rowsToShow"
          (input)="setRowsToShow($any($event.target).value)"
        />
      </label>
      <span class="hint">Drag widgets by the handle to reorder.</span>
    </div>
  </div>

  <div
    class="widgets-grid"
    cdkDropList
    [cdkDropListData]="widgets"
    [cdkDropListSortingDisabled]="true"
    cdkDropListOrientation="horizontal"
    (cdkDropListDropped)="drop($event)"
    [class.edit-mode]="editMode"
  >
    <div
      class="widget-shell"
      *ngFor="let widget of widgets; trackBy: trackByWidget"
      cdkDrag
      [cdkDragDisabled]="!editMode"
      #widgetItem
    >
      <div class="drag-handle" *ngIf="editMode" cdkDragHandle>
        Drag
      </div>
      <ng-container [ngSwitch]="widget">
        <app-customer-widget *ngSwitchCase="'customers'" [rowsToShow]="rowsToShow"></app-customer-widget>
        <app-orders-widget *ngSwitchCase="'orders'" [rowsToShow]="rowsToShow"></app-orders-widget>
        <app-products-widget *ngSwitchCase="'products'" [rowsToShow]="rowsToShow"></app-products-widget>
        <div class="fulfilment-widget" *ngSwitchCase="'fulfilment'">
          <div class="widget-header-row">
            <h3>Fulfilment History</h3>
            <a class="view-all" [routerLink]="['/fulfilment']">View all</a>
          </div>

          <div class="fulfilment-list" *ngIf="recentFulfilments.length; else noFulfilmentHistory">
            <a class="fulfilment-row" *ngFor="let item of recentFulfilments" [routerLink]="['/fulfilment/history', item.id]">
              <div class="id-status">
                <strong>{{ item.id }}</strong>
                <span class="status-pill">{{ item.status }}</span>
              </div>
              <div class="meta">{{ formatDate(item.createdAt) }}</div>
            </a>
          </div>

          <ng-template #noFulfilmentHistory>
            <div class="empty-fulfilment">No fulfilment requests yet.</div>
          </ng-template>
        </div>
      </ng-container>
    </div>
  </div>
  </ng-container>
</div>
