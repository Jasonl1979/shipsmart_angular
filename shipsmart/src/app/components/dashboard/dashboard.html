<div class="dashboard-container">
  <div class="dashboard-header">
    <div class="header-row">
      <div>
        <h1>{{ title }}</h1>
        <p class="subtitle">Welcome to your ShipSmart Dashboard</p>
      </div>
      <button class="edit-button" type="button" (click)="toggleEditMode()">
        {{ editMode ? 'Done' : 'Edit dashboard' }}
      </button>
    </div>
    <div class="dashboard-controls" *ngIf="editMode">
      <label class="control">
        Rows per widget
        <input
          type="number"
          min="1"
          max="20"
          [value]="rowsToShow"
          (input)="setRowsToShow($any($event.target).value)"
        />
      </label>
      <span class="hint">Drag widgets by the handle to reorder.</span>
    </div>
  </div>

  <div
    class="widgets-grid"
    cdkDropList
    [cdkDropListData]="widgets"
    [cdkDropListSortingDisabled]="true"
    cdkDropListOrientation="horizontal"
    (cdkDropListDropped)="drop($event)"
    [class.edit-mode]="editMode"
  >
    <div
      class="widget-shell"
      *ngFor="let widget of widgets; trackBy: trackByWidget"
      cdkDrag
      [cdkDragDisabled]="!editMode"
      #widgetItem
    >
      <div class="drag-handle" *ngIf="editMode" cdkDragHandle>
        Drag
      </div>
      <ng-container [ngSwitch]="widget">
        <app-customer-widget *ngSwitchCase="'customers'" [rowsToShow]="rowsToShow"></app-customer-widget>
        <app-orders-widget *ngSwitchCase="'orders'" [rowsToShow]="rowsToShow"></app-orders-widget>
        <app-products-widget *ngSwitchCase="'products'" [rowsToShow]="rowsToShow"></app-products-widget>
      </ng-container>
    </div>
  </div>
</div>
