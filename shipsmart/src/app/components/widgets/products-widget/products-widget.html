<div class="widget" [style.--rows-to-show]="rowsToShow">
  <div class="widget-header">
    <h3>🏷️ Products</h3>
  </div>
  <div class="widget-content">
    <div class="table-scroll">
      <table class="table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let product of dataService.products()">
            <td>{{ product.name }}</td>
            <td>{{ product.category }}</td>
            <td>${{ product.price }}</td>
            <td>{{ product.stock }}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <p class="note">Features: Import/Export, Categorization, Pricing</p>
  </div>
  <div class="widget-footer">
    <small>Dummy data - Future: JSON API integration</small>
  </div>
</div>
