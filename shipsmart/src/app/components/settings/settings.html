<div class="settings-container">
  <h2>Settings</h2>
  
  <div class="settings-section">
    <h3>Theme Preferences</h3>
    <div class="settings-group">
      <label>
        <input type="radio" name="theme" [checked]="themeMode === 'light'" (change)="setTheme('light')" />
        ☀️ Light Mode
      </label>
      <label>
        <input type="radio" name="theme" [checked]="themeMode === 'dark'" (change)="setTheme('dark')" />
        🌙 Dark Mode
      </label>
      <label>
        <input type="radio" name="theme" [checked]="themeMode === 'system'" (change)="setTheme('system')" />
        💻 System Default
      </label>
    </div>
  </div>

  <div class="settings-section">
    <h3>Other Settings</h3>
    <button type="button" class="settings-item link-item button-item" *ngIf="isAdmin" (click)="openManageCompany()">
      <span>🏢 Manage Company</span>
      <small>Edit company name and email</small>
    </button>
    <button type="button" class="settings-item link-item button-item" *ngIf="isAdmin" (click)="openManagePackage()">
      <span>📦 Manage Package</span>
      <small>Upgrade or downgrade your current plan</small>
    </button>
    <div class="settings-item disabled">
      <span>🔔 Notifications</span>
      <small>Coming soon - PostgreSQL integration required</small>
    </div>
    <div class="settings-item disabled">
      <span>📄 Export Data</span>
      <small>Coming soon - PostgreSQL integration required</small>
    </div>
  </div>
</div>
