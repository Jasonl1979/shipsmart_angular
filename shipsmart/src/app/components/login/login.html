<div class="login-container">
  <div class="login-form-wrapper">
    <div class="brand-section">
      <div class="logo">📦⚡</div>
      <h1>ShipSmart</h1>
      <p class="tagline">Smart Shipping Solution</p>
    </div>

    <div class="form-section" *ngIf="!showForgotPassword() && !showRegister()">
      <h2>Welcome Back</h2>
      <form (ngSubmit)="login()">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" #usernameInput placeholder="Enter username" [disabled]="isLoading()" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" #passwordInput placeholder="Enter password" [disabled]="isLoading()" />
        </div>
        <div class="error-message" *ngIf="error()">{{ error() }}</div>
        <button type="submit" class="btn-primary" [disabled]="isLoading()">
          {{ isLoading() ? 'Logging in...' : 'Login' }}
        </button>
      </form>
      <div class="form-footer">
        <button type="button" class="link-btn" (click)="toggleForgotPassword()">Forgot Password?</button>
        <span class="divider">|</span>
        <button type="button" class="link-btn" (click)="toggleRegister()">Register</button>
      </div>
    </div>

    <div class="form-section" *ngIf="showForgotPassword()">
      <h2>Forgot Password</h2>
      <p class="subtitle">Enter your email and we'll send you a reset link.</p>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>
      <button class="btn-primary">Send Reset Link</button>
      <p class="note">*Future: PostgreSQL integration*</p>
      <button type="button" class="link-btn back-btn" (click)="toggleForgotPassword()">← Back</button>
    </div>

    <div class="form-section" *ngIf="showRegister()">
      <h2>Create Account</h2>
      <p class="subtitle">Join ShipSmart today</p>
      <form>
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="Choose a username" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="Enter your email" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Create a password" />
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
        <p class="note">*Future: PostgreSQL integration*</p>
      </form>
      <button type="button" class="link-btn back-btn" (click)="toggleRegister()">← Back</button>
    </div>
  </div>
</div>
